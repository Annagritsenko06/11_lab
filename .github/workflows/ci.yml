name: CI

on:
  push:
    branches: [main, dev, fix]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -v
