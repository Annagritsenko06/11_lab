<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 40px auto; }
    form { display: grid; gap: 10px; }
    input, button { padding: 8px; font-size: 16px; }
    #result { margin-top: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <h1 id="title">Форма обратной связи</h1>
  <form id="feedbackForm">
    <input id="name" name="name" placeholder="Имя" />
    <input id="email" name="email" placeholder="Email" />
    <button id="submit" type="submit">Отправить</button>
  </form>
  <p id="result"></p>

  <script>
    const form = document.getElementById('feedbackForm');
    const result = document.getElementById('result');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name || !email || !email.includes('@')) {
        result.textContent = 'Проверьте данные';
        return;
      }
      result.textContent = 'Форма отправлена';
    });
  </script>
</body>
</html>
